<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Portal illusion task</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #fff;
    color: #000;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 16px;
    line-height: 1.4;
  }
  canvas {
    display: block;
    width: 100vw; height: 100vh;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  /* ─── UI CONTAINER — rotates to match required orientation ─── */
  #ui-container {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    transition: transform 0.3s ease;
  }
  #ui-container > * { pointer-events: auto; }
  #ui-container > .progress { pointer-events: none; }

  /* Task needs landscape but viewport is portrait → rotate UI 90° */
  @media (orientation: portrait) {
    body.task-landscape #ui-container {
      width: 100vh;
      height: 100vw;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(90deg);
    }
  }
  /* Task needs portrait but viewport is landscape → rotate UI -90° */
  @media (orientation: landscape) {
    body.task-portrait #ui-container {
      width: 100vh;
      height: 100vw;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-90deg);
    }
  }

  .screen {
    position: fixed; inset: 0;
    display: none;
    flex-direction: column;
    background: #fff;
    padding: 28px 22px;
    z-index: 10;
    overflow-y: auto;
  }
  .screen.active { display: flex; }
  .screen-center {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 14px;
  }
  h2 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  p {
    color: #333;
    margin-bottom: 24px;
    max-width: 380px;
  }
  em {
    font-style: italic;
    font-weight: 500;
  }

  /* Preview list shown on instruction screen */
  .preview {
    max-width: 340px;
    text-align: left;
    margin: 0 auto 24px;
    font-size: 14px;
    color: #555;
  }
  .preview p { margin-bottom: 6px; max-width: none; }
  .preview ul {
    list-style: disc;
    padding-left: 22px;
    margin: 0;
  }
  .preview li { margin-bottom: 3px; line-height: 1.35; }
  .preview em { color: #000; }

  /* Back-to-stimulus button on response screen */
  .back-btn {
    background: transparent;
    border: none;
    color: #555;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    padding: 8px 4px;
    text-decoration: underline;
    align-self: center;
    margin-bottom: 14px;
  }
  .back-btn:active { color: #000; }

  .btn {
    background: #000;
    color: #fff;
    border: 1px solid #000;
    padding: 13px 28px;
    font-size: 16px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
  }
  .btn:active { background: #333; }
  .btn:disabled { background: #bbb; border-color: #bbb; cursor: default; }
  .btn.secondary {
    background: #fff;
    color: #000;
    border: 1px solid #888;
  }
  .btn.secondary:active { background: #f0f0f0; }

  .progress { display: none; }  /* deprecated — menu is the home */

  /* ─── MENU ──────────────────────────────────────────── */
  .menu-intro {
    font-size: 14px !important;
    color: #555;
    max-width: 380px;
    margin-bottom: 18px !important;
  }
  .menu-intro em { color: #000; }
  .menu-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    max-width: 380px;
    margin-bottom: 16px;
  }
  .menu-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 14px;
    background: #fff;
    border: 1px solid #888;
    font-family: inherit;
    font-size: 16px;
    color: #000;
    cursor: pointer;
    text-align: left;
    transition: background 0.08s, border-color 0.08s;
  }
  .menu-item:active { background: #f0f0f0; }
  .menu-item.completed {
    border-color: #16a34a;
    background: #f3fbf5;
  }
  .menu-item.menu-sandbox {
    margin-top: 8px;
    border-style: dashed;
  }
  .menu-icon {
    width: 56px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .menu-icon .phone-shape.landscape { width: 48px; height: 30px; border-width: 2.5px; }
  .menu-icon .phone-shape.portrait  { width: 30px; height: 48px; border-width: 2.5px; }
  .menu-title {
    flex: 1;
    font-weight: 500;
  }
  .menu-check {
    width: 22px;
    flex-shrink: 0;
    font-size: 18px;
    color: #16a34a;
    font-weight: 700;
    text-align: center;
  }
  #operator-bar {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
  }
  .op-new {
    background: #000;
    color: #fff;
    border: none;
    padding: 12px 30px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
  }
  .op-new:active { background: #333; }
  .op-count {
    font-size: 12px;
    color: #888;
    font-variant-numeric: tabular-nums;
  }

  /* ─── SANDBOX-MODE CONTROLS ─────────────────────────── */
  #fps-control {
    position: fixed;
    bottom: calc(max(env(safe-area-inset-bottom, 0px), 10px) + 46px);
    left: 50%;
    transform: translateX(-50%);
    display: none;
    align-items: center;
    gap: 14px;
    background: #000;
    color: #fff;
    padding: 7px 14px;
    font-size: 13px;
    z-index: 20;
    touch-action: auto;
  }
  body.sandbox-mode #fps-control { display: flex; }
  #fps-control label { font-variant-numeric: tabular-nums; min-width: 62px; user-select: none; }
  #fps-slider {
    -webkit-appearance: none; appearance: none;
    width: 180px; height: 22px;
    background: transparent; cursor: pointer;
    touch-action: auto;
  }
  #fps-slider::-webkit-slider-runnable-track { height: 2px; background: #fff; }
  #fps-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    height: 18px; width: 18px; border-radius: 50%;
    background: #fff; margin-top: -8px;
  }
  #fps-slider::-moz-range-track { height: 2px; background: #fff; }
  #fps-slider::-moz-range-thumb {
    height: 18px; width: 18px; border-radius: 50%;
    background: #fff; border: none;
  }

  #sandbox-exit {
    position: fixed;
    top: max(env(safe-area-inset-top, 0px), 10px);
    left: 50%;
    transform: translateX(-50%);
    display: none;
    z-index: 20;
  }
  body.sandbox-mode #sandbox-exit { display: block; }
  body.sandbox-mode #task-overlay { display: none !important; }
  .exit-btn {
    background: #000;
    color: #fff;
    border: none;
    padding: 8px 18px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
  }
  .exit-btn:active { background: #333; }

  /* INSTRUCTION SCREEN */
  .icon {
    font-size: 88px;
    line-height: 1;
    color: #000;
    margin-bottom: 22px;
    font-weight: 200;
  }
  .phone-shape {
    display: inline-block;
    border: 3px solid #000;
    border-radius: 7px;
  }
  .phone-shape.landscape { width: 84px; height: 52px; }
  .phone-shape.portrait  { width: 52px; height: 84px; }
  .icon-rotate { animation: spin 3s ease-in-out infinite; display: inline-block; }
  .icon-horz   { animation: slide-h 2s ease-in-out infinite; display: inline-block; }
  .icon-vert   { animation: slide-v 2s ease-in-out infinite; display: inline-block; }
  .icon-depth  { animation: pulse 2s ease-in-out infinite; display: inline-block; }
  @keyframes spin    { 0% { transform: rotate(-25deg); } 50% { transform: rotate(25deg); } 100% { transform: rotate(-25deg); } }
  @keyframes slide-h { 0%, 100% { transform: translateX(-18px); } 50% { transform: translateX(18px); } }
  @keyframes slide-v { 0%, 100% { transform: translateY(-14px); } 50% { transform: translateY(14px); } }
  @keyframes pulse   { 0%, 100% { transform: scale(0.85); } 50% { transform: scale(1.15); } }

  /* NOISE-RUNNING UI */
  #task-overlay {
    position: fixed;
    top: max(env(safe-area-inset-top, 0px), 10px);
    left: 50%;
    transform: translateX(-50%);
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    z-index: 20;
  }
  body.running #task-overlay { display: flex; }

  .task-label {
    background: #000;
    color: #fff;
    padding: 5px 11px;
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
  }
  .task-label .progress-inline { color: #888; margin-right: 6px; }

  .done-btn {
    background: #16a34a;
    color: #fff;
    border: none;
    padding: 8px 18px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    min-width: 60px;
    text-align: center;
    transition: background 0.35s, color 0.35s, border-color 0.35s, padding 0.25s;
  }
  .done-btn:active:not(:disabled) { background: #128a3d; transform: scale(0.97); }
  .done-btn:disabled {
    background: #fff;
    color: #000;
    border: 1px solid #000;
    cursor: default;
    font-variant-numeric: tabular-nums;
  }
  .done-btn.just-enabled {
    animation: done-appear 0.85s ease-out;
    padding: 10px 24px;
  }
  @keyframes done-appear {
    0%   { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.7); }
    35%  { transform: scale(1.22); box-shadow: 0 0 0 18px rgba(22, 163, 74, 0); }
    70%  { transform: scale(0.97); }
    100% { transform: scale(1); }
  }

  /* ─── SIZE SLIDER (bottom, during noise) ───────────── */
  #size-control {
    position: fixed;
    bottom: max(env(safe-area-inset-bottom, 0px), 10px);
    left: 50%;
    transform: translateX(-50%);
    display: none;
    align-items: center;
    gap: 14px;
    background: #000;
    color: #fff;
    padding: 7px 14px;
    font-size: 13px;
    z-index: 20;
    touch-action: auto;
  }
  body.running #size-control { display: flex; }

  #size-control label {
    font-variant-numeric: tabular-nums;
    min-width: 56px;
    user-select: none;
  }
  #size-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 180px;
    height: 22px;
    background: transparent;
    cursor: pointer;
    touch-action: auto;
  }
  #size-slider::-webkit-slider-runnable-track {
    height: 2px; background: #fff;
  }
  #size-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    height: 18px; width: 18px;
    border-radius: 50%;
    background: #fff;
    margin-top: -8px;
  }
  #size-slider::-moz-range-track {
    height: 2px; background: #fff;
  }
  #size-slider::-moz-range-thumb {
    height: 18px; width: 18px;
    border-radius: 50%;
    background: #fff;
    border: none;
  }

  /* RESPONSE OPTIONS */
  .question {
    width: 100%;
    max-width: 420px;
  }
  .question-title {
    margin-bottom: 18px;
    font-size: 18px;
    font-weight: 600;
  }
  .choice {
    display: block;
    width: 100%;
    text-align: left;
    background: #fff;
    border: 1px solid #888;
    padding: 14px 14px;
    margin-bottom: 8px;
    color: #000;
    font-family: inherit;
    font-size: 15px;
    line-height: 1.35;
    cursor: pointer;
    transition: background 0.08s, color 0.08s, border-color 0.08s;
  }
  .choice:active { background: #f0f0f0; border-color: #000; }
  .choice.selected {
    background: #000;
    color: #fff;
    border-color: #000;
  }
  .choice:disabled { cursor: default; }

  .other {
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid #ddd;
  }
  .other label {
    display: block;
    font-size: 14px;
    color: #555;
    margin-bottom: 8px;
  }
  .other-row {
    display: flex;
    gap: 8px;
  }
  .other input[type="text"] {
    flex: 1;
    border: 1px solid #888;
    padding: 12px 12px;
    font-family: inherit;
    font-size: 15px;
    background: #fff;
    color: #000;
    min-width: 0;
  }
  .other input[type="text"]:focus { outline: none; border-color: #000; }
  .submit-other {
    background: #000;
    color: #fff;
    border: 1px solid #000;
    padding: 0 18px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.08s;
  }
  .submit-other:disabled { background: #bbb; border-color: #bbb; cursor: default; }
  .submit-other.selected { background: #555; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui-container">

<!-- MENU (home) -->
<div id="menu" class="screen active">
  <div class="screen-center">
    <h1>Portal illusion</h1>
    <p class="menu-intro">Tap a motion to try it. Tap again to redo. <em>Free explore</em> shows the noise with no task.</p>
    <div class="menu-list" id="menu-list"></div>
    <div id="operator-bar"></div>
  </div>
</div>

<!-- INSTRUCTION -->
<div id="instruction" class="screen">
  <div class="screen-center">
    <div class="icon" id="ins-icon"></div>
    <h2 id="ins-title"></h2>
    <p id="ins-desc"></p>
    <div class="preview" id="ins-preview"></div>
    <button class="btn" data-action="start-task">Start</button>
    <button class="back-btn" data-action="return-menu" style="margin-top:8px;">← Back to menu</button>
  </div>
</div>

<!-- NOISE OVERLAY (canvas itself is above, outside this container) -->
<div id="task-overlay">
  <button class="done-btn" data-action="finish-task">Done</button>
  <div class="task-label" id="ovl-instruction"></div>
</div>
<div id="size-control">
  <label for="size-slider">size <span id="size-val">6</span></label>
  <input type="range" id="size-slider" min="1" max="30" step="1" value="6">
</div>
<div id="fps-control">
  <label for="fps-slider">speed <span id="fps-val">60</span></label>
  <input type="range" id="fps-slider" min="1" max="60" step="1" value="60">
</div>
<div id="sandbox-exit">
  <button class="exit-btn" data-action="exit-sandbox">Exit</button>
</div>

<!-- RESPONSE -->
<div id="response" class="screen">
  <div class="screen-center">
    <div class="question">
      <button class="back-btn" data-action="back-to-stimulus">← Watch the pattern again</button>
      <div class="question-title" id="resp-title"></div>
      <div id="resp-choices"></div>
      <div class="other">
        <label for="resp-other">Or, something else:</label>
        <div class="other-row">
          <input type="text" id="resp-other" placeholder="describe what you saw" autocomplete="off" autocapitalize="sentences">
          <button class="submit-other" id="submit-other" disabled>Submit</button>
        </div>
      </div>
    </div>
  </div>
</div>

</div><!-- /ui-container -->

<script>
(function() {
  // ─── CONFIG ─────────────────────────────────────────────
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzJGxgV5RhMEja6ijQ2pwQRsvLZbCOFTVklXNgZbxV27pdAjMkKCOxBP_XHFBS1Aq9q/exec";

  const params = new URLSearchParams(location.search);
  let cellSize = Math.max(1, parseInt(params.get('cell')) || 6);
  let targetFPS = Math.max(1, Math.min(120, parseInt(params.get('fps')) || 60));
  const density = Math.max(0, Math.min(1, parseFloat(params.get('p')) || 0.5));
  const minSeconds = Math.max(0, parseInt(params.get('min') ?? '5'));

  // Operator mode: tablet loads ...?op=OPERATOR_KEY to unlock the
  // "New participant" control. The QR code points to the plain URL,
  // so phone scanners never see it. Change the key freely.
  const OPERATOR_KEY = 'shimojo-demo';
  const isOperator = params.get('op') === OPERATOR_KEY;

  // ─── CONDITIONS ─────────────────────────────────────────
  const CONDITIONS = [
    {
      key: 'horizontal',
      orient: 'landscape', iconClass: 'icon-horz',
      title: 'Move side to side',
      desc: 'Hold your phone in landscape orientation, then move it slowly left and right.',
      shortInstruction: 'Move side to side',
      question: 'What did the pattern do while you moved <em>side to side</em>?',
      options: [
        { key: 'opposite',   text: 'It moved opposite to my phone' },
        { key: 'further',    text: 'It moved with my phone, but <em>further</em>' },
        { key: 'with_phone', text: 'It moved with my phone' },
        { key: 'nothing',    text: "Wasn't sure / didn't notice anything" },
      ],
    },
    {
      key: 'vertical',
      orient: 'portrait', iconClass: 'icon-vert',
      title: 'Move up and down',
      desc: 'Hold your phone in portrait orientation, then move it slowly up and down.',
      shortInstruction: 'Move up and down',
      question: 'What did the pattern do while you moved <em>up and down</em>?',
      options: [
        { key: 'opposite',   text: 'It moved opposite to my phone' },
        { key: 'further',    text: 'It moved with my phone, but <em>further</em>' },
        { key: 'with_phone', text: 'It moved with my phone' },
        { key: 'nothing',    text: "Wasn't sure / didn't notice anything" },
      ],
    },
    {
      key: 'rotation',
      orient: 'landscape', iconClass: 'icon-rotate',
      title: 'Rotate the phone',
      desc: 'Hold your phone flat in front of you and slowly rotate it back and forth.',
      shortInstruction: 'Rotate the phone',
      question: 'What did the pattern do while you <em>rotated</em>?',
      options: [
        { key: 'opposite',   text: 'It rotated opposite to my phone' },
        { key: 'further',    text: 'It rotated with my phone, but <em>further</em>' },
        { key: 'with_phone', text: 'It rotated with my phone' },
        { key: 'nothing',    text: "Wasn't sure / didn't notice anything" },
      ],
    },
    {
      key: 'depth',
      orient: 'landscape', iconClass: 'icon-depth',
      title: 'Move closer and farther',
      desc: 'Hold your phone and slowly bring it closer and farther from your face.',
      shortInstruction: 'Move closer and farther',
      question: 'What did the pattern do while you moved <em>closer and farther</em>?',
      options: [
        { key: 'opposite',   text: 'It moved opposite to my phone' },
        { key: 'further',    text: 'It moved with my phone, but <em>further</em>' },
        { key: 'with_phone', text: 'It moved with my phone' },
        { key: 'nothing',    text: "Wasn't sure / didn't notice anything" },
      ],
    },
  ];

  // Operator/tablet override: the demo tablet is fixed in landscape, so the
  // vertical task should NOT rotate the UI to portrait. Phone (participant)
  // mode keeps portrait, since phone users can physically rotate their device.
  if (isOperator) {
    const v = CONDITIONS.find(c => c.key === 'vertical');
    if (v) {
      v.orient = 'landscape';
      v.desc = 'Move it slowly up and down.';
    }
  }

  // ─── STATE ──────────────────────────────────────────────
  const completed = { horizontal: false, vertical: false, rotation: false, depth: false };
  let currentTask = null;

  function makeSessionId() {
    return (window.crypto && crypto.randomUUID)
      ? crypto.randomUUID()
      : Math.random().toString(36).slice(2) + Date.now().toString(36);
  }
  let sessionId = makeSessionId();
  let participantNum = 1;

  // ─── NOISE ──────────────────────────────────────────────
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let running = false;
  let wakeLock = null;
  const small = document.createElement('canvas');
  const smallCtx = small.getContext('2d');
  let imgData;

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.floor(window.innerWidth * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    small.width = Math.max(1, Math.ceil(canvas.width / cellSize));
    small.height = Math.max(1, Math.ceil(canvas.height / cellSize));
    ctx.imageSmoothingEnabled = false;
    imgData = smallCtx.createImageData(small.width, small.height);
    const d = imgData.data;
    for (let i = 3; i < d.length; i += 4) d[i] = 255;
  }

  function generate() {
    const data = imgData.data;
    const len = small.width * small.height;
    for (let i = 0; i < len; i++) {
      const v = Math.random() < density ? 255 : 0;
      const o = i * 4;
      data[o] = v; data[o+1] = v; data[o+2] = v;
    }
    smallCtx.putImageData(imgData, 0, 0);
    ctx.drawImage(small, 0, 0, canvas.width, canvas.height);
  }

  let lastT = 0;
  function loop(t) {
    if (!running) return;
    const interval = 1000 / targetFPS;
    if (t - lastT >= interval - 1) { generate(); lastT = t; }
    requestAnimationFrame(loop);
  }

  // ─── SCREEN MGMT ───────────────────────────────────────
  const screens = {
    menu:        document.getElementById('menu'),
    instruction: document.getElementById('instruction'),
    response:    document.getElementById('response'),
  };
  function showScreen(name) {
    for (const k in screens) screens[k].classList.toggle('active', k === name);
  }

  // ─── MENU ──────────────────────────────────────────────
  function renderMenu() {
    const list = document.getElementById('menu-list');
    list.innerHTML = '';
    CONDITIONS.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'menu-item' + (completed[c.key] ? ' completed' : '');
      btn.dataset.task = c.key;
      btn.innerHTML =
        '<div class="menu-icon">' +
          '<div class="phone-shape ' + c.orient + ' ' + c.iconClass + '"></div>' +
        '</div>' +
        '<div class="menu-title">' + c.title + '</div>' +
        '<div class="menu-check">' + (completed[c.key] ? '✓' : '') + '</div>';
      list.appendChild(btn);
    });
    // Sandbox row (always present)
    const sandbox = document.createElement('button');
    sandbox.className = 'menu-item menu-sandbox';
    sandbox.dataset.task = 'sandbox';
    sandbox.innerHTML =
      '<div class="menu-icon">' +
        '<div class="phone-shape landscape"></div>' +
      '</div>' +
      '<div class="menu-title">Free explore</div>' +
      '<div class="menu-check"></div>';
    list.appendChild(sandbox);
  }

  function renderOperatorBar() {
    const bar = document.getElementById('operator-bar');
    if (!isOperator) { bar.innerHTML = ''; return; }
    bar.innerHTML =
      '<button class="op-new" data-action="new-participant">New participant</button>' +
      '<div class="op-count">Participant ' + participantNum + '</div>';
  }

  function showMenu() {
    currentTask = null;
    document.body.classList.remove('task-landscape', 'task-portrait', 'sandbox-mode');
    renderMenu();
    renderOperatorBar();
    showScreen('menu');
  }

  function newParticipant() {
    sessionId = makeSessionId();
    participantNum++;
    for (const k in completed) completed[k] = false;
    renderMenu();
    renderOperatorBar();
  }

  // ─── TASK FLOW ─────────────────────────────────────────
  function startCondition(key) {
    const c = CONDITIONS.find(x => x.key === key);
    if (!c) return;
    currentTask = c;

    document.body.classList.remove('task-landscape', 'task-portrait', 'sandbox-mode');
    if (c.orient) document.body.classList.add('task-' + c.orient);

    document.getElementById('ins-icon').innerHTML =
      '<div class="phone-shape ' + c.orient + ' ' + c.iconClass + '"></div>';
    document.getElementById('ins-title').textContent = c.title;
    document.getElementById('ins-desc').textContent = c.desc;
    document.getElementById('ovl-instruction').textContent = c.shortInstruction;

    const previewItems = c.options
      .filter(opt => opt.key !== 'nothing')
      .map(opt => '<li>' + opt.text + '</li>')
      .join('');
    document.getElementById('ins-preview').innerHTML =
      '<p>While you do, watch what the pattern does. After, you\'ll be asked whether it:</p>' +
      '<ul>' + previewItems + '</ul>';

    // Fresh response-screen state per condition entry from menu.
    // Preserved across back-to-stimulus within the same task entry.
    const txt = document.getElementById('resp-other');
    txt.value = '';
    txt.disabled = false;
    const subBtn = document.getElementById('submit-other');
    subBtn.disabled = true;
    subBtn.classList.remove('selected');

    showScreen('instruction');
  }

  let exposureTimer = null;

  async function startTask(isReview) {
    showScreen(null);
    document.body.classList.add('running');
    resize();
    running = true;

    const btn = document.querySelector('.done-btn');
    btn.classList.remove('just-enabled');
    if (minSeconds > 0 && !isReview) {
      btn.disabled = true;
      btn.textContent = minSeconds + 's';
      const startedAt = Date.now();
      exposureTimer = setInterval(() => {
        const elapsed = (Date.now() - startedAt) / 1000;
        const remaining = minSeconds - elapsed;
        if (remaining > 0) {
          btn.textContent = Math.ceil(remaining) + 's';
        } else {
          btn.textContent = 'Done';
          btn.disabled = false;
          btn.classList.add('just-enabled');
          clearInterval(exposureTimer);
          exposureTimer = null;
        }
      }, 200);
    } else {
      btn.textContent = 'Done';
      btn.disabled = false;
    }

    try {
      if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
    } catch (e) {}
    requestAnimationFrame(loop);
  }

  function finishTask() {
    if (exposureTimer) { clearInterval(exposureTimer); exposureTimer = null; }
    running = false;
    document.body.classList.remove('running');
    if (!currentTask) { showMenu(); return; }
    const c = currentTask;
    document.getElementById('resp-title').innerHTML = c.question;
    const wrap = document.getElementById('resp-choices');
    wrap.innerHTML = '';
    c.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'choice';
      btn.innerHTML = opt.text;
      btn.dataset.response = opt.key;
      wrap.appendChild(btn);
    });
    showScreen('response');
  }

  function backToStimulus() { startTask(true); }

  let submitting = false;

  function submit(responseKey, otherText) {
    if (submitting) return;
    submitting = true;

    document.querySelectorAll('.choice').forEach(b => {
      if (b.dataset.response === responseKey) b.classList.add('selected');
      b.disabled = true;
    });
    const subBtn = document.getElementById('submit-other');
    const txtIn = document.getElementById('resp-other');
    if (responseKey === 'other') subBtn.classList.add('selected');
    subBtn.disabled = true;
    txtIn.disabled = true;

    const c = currentTask;
    const payload = {
      session: sessionId,
      ts: new Date().toISOString(),
      condition: c.key,
      response: responseKey,
      text: otherText || '',
    };

    if (SCRIPT_URL && SCRIPT_URL.indexOf('PASTE_YOUR') < 0) {
      try {
        fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          keepalive: true,
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload),
        }).catch(e => console.error('submit failed', e));
      } catch (e) { console.error('submit threw', e); }
    } else {
      console.warn('No SCRIPT_URL set — response not sent:', payload);
    }

    setTimeout(() => {
      submitting = false;
      completed[c.key] = true;
      if (wakeLock) { wakeLock.release(); wakeLock = null; }
      showMenu();
    }, 250);
  }

  function returnMenuFromInstruction() {
    showMenu();
  }

  // ─── SANDBOX ───────────────────────────────────────────
  async function startSandbox() {
    currentTask = null;
    document.body.classList.remove('task-landscape', 'task-portrait');
    document.body.classList.add('sandbox-mode', 'running');
    showScreen(null);
    resize();
    running = true;
    try {
      if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
    } catch (e) {}
    requestAnimationFrame(loop);
  }

  function exitSandbox() {
    running = false;
    if (wakeLock) { wakeLock.release(); wakeLock = null; }
    document.body.classList.remove('sandbox-mode', 'running');
    showMenu();
  }

  // ─── EVENTS ────────────────────────────────────────────
  document.addEventListener('click', e => {
    const action = e.target.closest('[data-action]')?.dataset.action;
    if (action === 'start-task')            startTask(false);
    else if (action === 'finish-task')      finishTask();
    else if (action === 'back-to-stimulus') backToStimulus();
    else if (action === 'return-menu')      showMenu();
    else if (action === 'exit-sandbox')     exitSandbox();
    else if (action === 'new-participant')  newParticipant();

    const menuItem = e.target.closest('.menu-item');
    if (menuItem) {
      const key = menuItem.dataset.task;
      if (key === 'sandbox') startSandbox();
      else if (CONDITIONS.some(c => c.key === key)) startCondition(key);
    }

    const choice = e.target.closest('.choice');
    if (choice) submit(choice.dataset.response);

    if (e.target.id === 'submit-other') {
      const txt = document.getElementById('resp-other').value.trim();
      if (txt) submit('other', txt);
    }
  });

  document.getElementById('resp-other').addEventListener('input', e => {
    document.getElementById('submit-other').disabled = !e.target.value.trim();
  });

  // ─── SIZE SLIDER ───────────────────────────────────────
  const sizeSlider = document.getElementById('size-slider');
  const sizeVal = document.getElementById('size-val');
  sizeSlider.value = cellSize;
  sizeVal.textContent = cellSize;
  sizeSlider.addEventListener('input', e => {
    const v = Math.max(1, parseInt(e.target.value) || 1);
    cellSize = v;
    sizeVal.textContent = v;
    if (running) resize();
  });

  // ─── FPS SLIDER (sandbox only) ─────────────────────────
  const fpsSlider = document.getElementById('fps-slider');
  const fpsVal = document.getElementById('fps-val');
  fpsSlider.value = targetFPS;
  fpsVal.textContent = targetFPS;
  fpsSlider.addEventListener('input', e => {
    const v = Math.max(1, parseInt(e.target.value) || 1);
    targetFPS = v;
    fpsVal.textContent = v;
  });

  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 200));
  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible' && running && !wakeLock) {
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
    }
  });

  // Initial render
  resize();
  renderMenu();
  renderOperatorBar();
})();
</script>
</body>
</html>
